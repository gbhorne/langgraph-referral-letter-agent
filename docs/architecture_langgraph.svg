<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#993556" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="580" fill="#ffffff"/>

<!-- Repo name -->
<text font-family="Arial, sans-serif" font-size="11" x="340" y="16" text-anchor="middle" fill="#888780">gbhorne/langgraph-referral-letter-agent</text>

<!-- Title -->
<text font-family="Arial, sans-serif" font-size="15" font-weight="600" x="340" y="34" text-anchor="middle" fill="#2C2C2A">LangGraph Referral Letter Agent -- StateGraph architecture</text>

<!-- RL-1 -->
<rect x="240" y="50" width="200" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="340" y="71" text-anchor="middle" fill="#3C3489">RL-1  load_referral_context</text>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="89" text-anchor="middle" fill="#534AB7">ServiceRequest + FHIR reads</text>
<line x1="340" y1="100" x2="340" y2="124" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- RL-2 -->
<rect x="240" y="124" width="200" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="340" y="145" text-anchor="middle" fill="#3C3489">RL-2  classify_urgency</text>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="163" text-anchor="middle" fill="#534AB7">Gemini -- structured UrgencyClassification</text>

<!-- Conditional edge label -->
<rect x="270" y="180" width="140" height="22" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="195" text-anchor="middle" fill="#5F5E5A">conditional edge</text>

<!-- Lines from RL-2 to conditional, then branch -->
<line x1="340" y1="174" x2="340" y2="180" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>

<!-- Left branch line to rl3 -->
<path d="M300 202 L160 202 L160 260" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
<text font-family="Arial, sans-serif" font-size="10" x="220" y="196" text-anchor="middle" fill="#534AB7">ROUTINE / URGENT</text>

<!-- Right branch line to rl3_emergent -->
<path d="M380 202 L520 202 L520 260" fill="none" stroke="#993556" stroke-width="1.5" marker-end="url(#arrow-pink)"/>
<text font-family="Arial, sans-serif" font-size="10" x="458" y="196" text-anchor="middle" fill="#993556">EMERGENT</text>

<!-- RL-3 standard -->
<rect x="60" y="260" width="200" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="160" y="281" text-anchor="middle" fill="#3C3489">RL-3  extract_history</text>
<text font-family="Arial, sans-serif" font-size="11" x="160" y="299" text-anchor="middle" fill="#534AB7">Standard path</text>

<!-- RL-3 emergent -->
<rect x="420" y="260" width="200" height="50" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="520" y="281" text-anchor="middle" fill="#72243E">RL-3E  extract_history</text>
<text font-family="Arial, sans-serif" font-size="11" x="520" y="299" text-anchor="middle" fill="#993556">EMERGENT fast-track path</text>

<!-- Lines from both RL-3 nodes converging to RL-4 -->
<path d="M160 310 L160 360 L240 360" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
<path d="M520 310 L520 360 L440 360" fill="none" stroke="#993556" stroke-width="1.5" marker-end="url(#arrow-pink)"/>

<!-- RL-4 -->
<rect x="240" y="340" width="200" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="340" y="361" text-anchor="middle" fill="#3C3489">RL-4  generate_letter</text>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="379" text-anchor="middle" fill="#534AB7">LOINC 57133-1 compliant letter</text>
<line x1="340" y1="390" x2="340" y2="414" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- RL-5 -->
<rect x="240" y="414" width="200" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="340" y="435" text-anchor="middle" fill="#3C3489">RL-5  assemble_document</text>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="453" text-anchor="middle" fill="#534AB7">FHIR DocumentReference -- preliminary</text>
<line x1="340" y1="464" x2="340" y2="488" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- RL-6 -->
<rect x="240" y="488" width="200" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="13" font-weight="600" x="340" y="509" text-anchor="middle" fill="#3C3489">RL-6  route_and_notify</text>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="527" text-anchor="middle" fill="#534AB7">DLP, FHIR write, Pub/Sub, Firestore</text>
<line x1="340" y1="538" x2="340" y2="555" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- END -->
<rect x="295" y="555" width="90" height="20" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="11" x="340" y="569" text-anchor="middle" fill="#5F5E5A">END</text>

<!-- Legend -->
<rect x="548" y="300" width="116" height="76" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="11" x="558" y="318" fill="#5F5E5A">Legend</text>
<rect x="558" y="328" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="11" x="576" y="339" fill="#2C2C2A">Standard node</text>
<rect x="558" y="348" width="12" height="12" rx="2" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="11" x="576" y="359" fill="#2C2C2A">EMERGENT node</text>
<rect x="558" y="368" width="12" height="12" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="11" x="576" y="379" fill="#2C2C2A">Conditional edge</text>

</svg>
